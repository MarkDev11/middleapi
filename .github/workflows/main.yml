name: Ping Multiple HF Spaces 24 Jam

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  ping-job:
    runs-on: ubuntu-latest
    steps:
      - name: Eksekusi HTTP GET Request ke Banyak URL
        run: |
          # Masukkan daftar URL di bawah ini, letakkan di dalam tanda kutip dan pisahkan dengan baris baru atau spasi
          URLS=(
            "https://markdevilyt-vs.hf.space"
            "https://elysiadev11-proxy.hf.space"
            "https://elysiadev11-proxycf.hf.space"
          )

          # Loop untuk mengeksekusi ping ke setiap URL
          for URL in "${URLS[@]}"; do
            echo "--------------------------------------------------"
            echo "Memulai ping ke $URL..."
            
            # Menggunakan -L agar mengikuti redirect (302) hingga mendapat respons akhir
            STATUS_CODE=$(curl -s -L -o /dev/null -w "%{http_code}" -X GET "$URL")
            
            echo "Waktu: $(date)"
            echo "Kode Status HTTP: $STATUS_CODE"
          done
          
          echo "--------------------------------------------------"
          echo "Semua tugas ping selesai."
